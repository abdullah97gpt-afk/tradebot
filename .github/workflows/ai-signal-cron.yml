name: AI Signal Engine

# ── Schedule: every 5 minutes ────────────────────────────────────────────────
# GitHub Actions minimum schedule interval is 5 minutes.
# Note: GitHub may delay jobs by a few minutes during high load.
on:
  schedule:
    - cron: "*/5 * * * *"
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  run-signal-engine:
    name: Generate XAUUSD Signal
    runs-on: ubuntu-latest
    timeout-minutes: 4        # kill job before next 5-min cycle starts

    defaults:
      run:
        working-directory: ai_engine

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "ai_engine/requirements.txt"

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 4. Run AI engine ─────────────────────────────────────────
      - name: Run AI signal engine
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MARKET_DATA_API_KEY:       ${{ secrets.MARKET_DATA_API_KEY }}
          NEWS_API_KEY:              ${{ secrets.NEWS_API_KEY }}
          LOG_LEVEL:                 ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
        run: python main.py

      # ── 5. Upload logs on failure ─────────────────────────────────
      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: engine-failure-log-${{ github.run_id }}
          path: ai_engine/
          retention-days: 3
